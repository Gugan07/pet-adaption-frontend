<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – PawHaven</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav>
    <div class="nav-logo"><span>🐾</span> PawHaven</div>
    <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="adaption.html">Adoption</a></li>
        <li><a href="seller.html">Sellers</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li><a href="login.html" class="btn-nav active">Login</a></li>
    </ul>
</nav>

<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-logo"><span>🐾</span> PawHaven</div>
        <p class="auth-subtitle">Welcome back! Sign in to your account.</p>

        <form>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="Enter your password">
            </div>
            <div style="text-align:right;margin-bottom:20px;">
                <a href="forget.html" style="font-size:13px;color:var(--primary);font-weight:600;">Forgot Password?</a>
            </div>
            <button type="submit" class="btn btn-primary">Login to Account</button>
        </form>

        <div class="divider">or</div>

        <div class="form-link">
            Don't have an account? <a href="signup.html">Create one free</a>
        </div>
    </div>
</div>

<footer>
    <div class="footer-bottom" style="border-top:none;padding-top:0;">
        <p>© 2026 PawHaven Pet Shop. All rights reserved.</p>
        <div style="display:flex;gap:20px;">
            <a href="privacy.html">Privacy</a>
            <a href="terms.html">Terms</a>
            <a href="contact.html">Contact</a>
        </div>
    </div>
</footer>

</body>
</html>
